name: Release Package Archive

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  archive-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Package Archive
        run: |
          PACKAGE_DIR="invoice-pro-${{ github.ref_name }}"

          mkdir -p "$PACKAGE_DIR"

          cp -r typst.toml "$PACKAGE_DIR/"
          cp -r LICENSE "$PACKAGE_DIR/"
          cp -r src "$PACKAGE_DIR/"
          cp -r template "$PACKAGE_DIR/"

          # Create the tarball
          tar -czvf "$PACKAGE_DIR.tar.gz" "$PACKAGE_DIR"

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v1
        with:
          files: invoice-pro-${{ github.ref_name }}.tar.gz
