name: ZUGFeRD Validation
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/integration/**"
      - "template/**"
      - "flake.nix"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/integration/**"
      - "template/**"
      - "flake.nix"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 #  v17
        with:
          name: typ-flow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate ZUGFeRD PDF
        run: |
          mkdir -p /tmp/extracted/zugferd-basic /tmp/extracted/zugferd-small-biz /tmp/extracted/invoice
          nix run .#validate-zugferd --accept-flake-config -- "tests/integration/zugferd-basic/test.typ" "/tmp/extracted/zugferd-basic.pdf"
          nix run .#validate-zugferd --accept-flake-config -- "tests/integration/zugferd-small-biz/test.typ" "/tmp/extracted/zugferd-small-biz.pdf"
          nix run .#validate-zugferd --accept-flake-config -- "template/invoice.typ" "/tmp/extracted/invoice.pdf"
          nix shell nixpkgs#poppler_utils --command bash -c "
            pdfdetach -saveall -o /tmp/extracted/zugferd-basic /tmp/extracted/zugferd-basic.pdf
            pdfdetach -saveall -o /tmp/extracted/zugferd-small-biz /tmp/extracted/zugferd-small-biz.pdf
            pdfdetach -saveall -o /tmp/extracted/invoice /tmp/extracted/invoice.pdf
          "

      - name: Archive extracted XML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: zugferd-xml
          path: /tmp/extracted/
          retention-days: 5
