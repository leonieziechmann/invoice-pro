name: ZUGFeRD Validation
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/integration/zugferd-basic/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/integration/zugferd-basic/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: typ-flow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compile ZUGFeRD PDF
        run: |
          nix develop --accept-flake-config --command typst compile \
            --root . \
            --pdf-standard=a-3b \
            tests/integration/zugferd-basic/test.typ \
            /tmp/zugferd-test.pdf

      - name: Extract factur-x.xml
        run: |
          sudo apt-get install -y poppler-utils
          mkdir -p /tmp/extracted
          pdfdetach -saveall -o /tmp/extracted /tmp/zugferd-test.pdf

      - name: Download Mustangproject validator
        run: |
          curl -L -o /tmp/mustang.jar \
            https://github.com/ZUGFeRD/mustangproject/releases/download/core-2.14.0/Mustang-CLI-2.14.0.jar

      - name: Validate ZUGFeRD XML
        run: |
          java -jar /tmp/mustang.jar \
            --action validate \
            --source /tmp/extracted/factur-x.xml

      - name: Archive extracted XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zugferd-xml
          path: /tmp/extracted/
          retention-days: 5
