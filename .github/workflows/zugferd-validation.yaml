name: ZUGFeRD Validation
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/integration/zugferd-basic/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/integration/zugferd-basic/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: typ-flow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate ZUGFeRD PDF
        run: |
          mkdir -p /tmp/extracted
          nix run .#validate-zugferd --accept-flake-config -- /tmp/extracted

      - name: Archive extracted XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zugferd-xml
          path: /tmp/extracted/
          retention-days: 5
